<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Freeza Live</title>
  <link rel="stylesheet" href="styles.css?v=reset-20260710-10" />
  <link rel="stylesheet" href="start-screen.css?v=reset-20260710-10" />
  <link rel="stylesheet" href="game-screen.css?v=reset-20260710-10" />
  <link rel="stylesheet" href="chord-keys.css?v=reset-20260710-10" />
</head>
<body>

  <section id="startScreen" class="launch-screen" aria-label="演奏设置">
    <div class="launch-glow launch-glow-a" aria-hidden="true"></div>
    <div class="launch-glow launch-glow-b" aria-hidden="true"></div>
    <div class="launch-shell">
      <header class="launch-header">
        <div class="launch-brand">
          <div class="launch-logo" aria-hidden="true">
            <span></span><span></span><span></span><span></span><span></span>
          </div>
          <div>
            <div class="launch-eyebrow">LIVE PERFORMANCE</div>
            <h1>Freeza <em>Live</em></h1>
          </div>
        </div>
        <div class="launch-status">
          <span class="launch-status-dot"></span>
          <span>Studio ready</span>
          <b id="startVersion">v20260710.10</b>
        </div>
      </header>

      <div class="launch-dashboard">
        <section class="launch-panel launch-performance">
          <div class="launch-panel-heading">
            <div>
              <span class="launch-kicker">PERFORMANCE</span>
              <h2>演奏方式</h2>
            </div>
            <span class="launch-heading-icon" aria-hidden="true">⌁</span>
          </div>

          <div class="launch-performance-grid">
            <div class="launch-control-group">
              <div class="launch-control-label"><span>模式</span><small>和弦触发</small></div>
              <div class="launch-choice-stack" data-group="mode">
                <button class="launch-choice" data-mode="auto"><b>自动</b><span>全自动和弦</span></button>
                <button class="launch-choice selected" data-mode="semi"><b>辅助</b><span>半自动和弦</span></button>
                <button class="launch-choice" data-mode="manual"><b>手动</b><span>自由触发</span></button>
              </div>
            </div>

            <div class="launch-control-group">
              <div class="launch-control-label"><span>鼓机</span><small>节奏跟随</small></div>
              <div class="launch-choice-stack" data-group="drum">
                <button class="launch-choice selected" data-drum="auto"><b>智能</b><span>跟随风格</span></button>
                <button class="launch-choice" data-drum="on"><b>开启</b><span>持续伴奏</span></button>
                <button class="launch-choice" data-drum="off"><b>关闭</b><span>纯净演奏</span></button>
              </div>
            </div>
          </div>

          <div class="launch-pick-row">
            <div>
              <span>拨片音色</span>
              <small>切换当前伴奏触感</small>
            </div>
            <div class="launch-segment" data-group="pick">
              <button class="launch-segment-btn selected" data-pick="A">A</button>
              <button class="launch-segment-btn" data-pick="B">B</button>
            </div>
          </div>
        </section>

        <section class="launch-panel launch-mixer">
          <div class="launch-panel-heading">
            <div>
              <span class="launch-kicker">MIXER</span>
              <h2>声音控制</h2>
            </div>
            <span class="launch-heading-icon launch-level-icon" aria-hidden="true"><i></i><i></i><i></i></span>
          </div>
          <div class="launch-mixer-rows">
            <label class="launch-fader-row">
              <span class="launch-fader-name">主旋律</span>
              <input id="menuMelodyVolRange" class="launch-range" type="range" min="25" max="200" step="5" value="100" aria-label="主旋律音量" />
              <output id="menuMelodyVolValue" class="launch-readout">100%</output>
            </label>
            <label class="launch-fader-row">
              <span class="launch-fader-name">伴奏</span>
              <input id="menuHarmonyVolRange" class="launch-range" type="range" min="25" max="200" step="5" value="155" aria-label="伴奏音量" />
              <output id="menuHarmonyVolValue" class="launch-readout">155%</output>
            </label>
            <label class="launch-fader-row">
              <span class="launch-fader-name">鼓机</span>
              <input id="menuDrumVolRange" class="launch-range" type="range" min="25" max="200" step="5" value="155" aria-label="鼓机音量" />
              <output id="menuDrumVolValue" class="launch-readout">155%</output>
            </label>
            <label class="launch-fader-row">
              <span class="launch-fader-name">Key</span>
              <input id="menuKeyRange" class="launch-range" type="range" min="-14" max="14" step="1" value="0" aria-label="Key" />
              <output id="menuKeyValue" class="launch-readout">0</output>
            </label>
          </div>
        </section>

        <section class="launch-panel launch-switches">
          <div class="launch-panel-heading launch-panel-heading-compact">
            <div>
              <span class="launch-kicker">SIGNAL</span>
              <h2>演奏信号</h2>
            </div>
          </div>
          <div class="launch-toggle-grid">
            <div class="launch-toggle-item">
              <div><b>主旋律</b><small>旋律声部</small></div>
              <div class="launch-switch" data-group="melody">
                <button class="selected" data-melody="on">开</button>
                <button data-melody="off">关</button>
              </div>
            </div>
            <div class="launch-toggle-item">
              <div><b>引导</b><small>视觉提示</small></div>
              <div class="launch-switch" data-group="guide">
                <button data-guide="on">开</button>
                <button class="selected" data-guide="off">关</button>
              </div>
            </div>
            <div class="launch-toggle-item">
              <div><b>麦克风</b><small>录音输入</small></div>
              <div class="launch-switch" data-group="mic">
                <button data-mic="on">开</button>
                <button class="selected" data-mic="off">关</button>
              </div>
            </div>
          </div>
        </section>
      </div>

      <footer class="launch-footer">
        <div class="launch-footnote"><span></span>设置会同步到演奏画面</div>
        <button id="startGameBtn" class="launch-start-btn">
          <span>进入演奏</span>
          <i aria-hidden="true">→</i>
        </button>
      </footer>

      <div id="loadingFrame" class="launch-loading" aria-live="polite">
        <div class="launch-loader"><span></span><span></span><span></span><span></span></div>
        <div id="loadingText" class="launch-loading-text">准备载入…</div>
      </div>
    </div>
  </section>
  <div id="countdownOverlay" class="countdown-overlay" aria-hidden="true"></div>

  <div id="savePrompt" class="save-prompt" aria-hidden="true">
    <div class="save-card" role="dialog" aria-label="保存录音">
      <div class="save-orb">🎙</div>
      <div class="save-title">保存本次录音？</div>
      <div class="save-subtitle">已录下麦克风和伴奏</div>
      <div id="savePromptSize" class="save-size">准备文件…</div>
      <div class="save-actions">
        <button id="savePromptCancel" class="save-btn ghost">不要</button>
        <button id="savePromptDownload" class="save-btn primary">保存</button>
      </div>
    </div>
  </div>
  <main class="game">
    <div class="freeza-icon" aria-label="freeza live icon"><span class="horn left"></span><span class="horn right"></span><span class="crest"></span><span class="temple left"></span><span class="temple right"></span><span class="brow left"></span><span class="brow right"></span><span class="eye left"></span><span class="eye right"></span><span class="nose"></span><span class="mouth"></span><span class="chin"></span></div>
    <header class="hud">
      <button id="playBtn" class="btn green" aria-label="play">▶</button>
      <button id="restartBtn" class="btn blue wide" aria-label="restart">↻ 重唱</button>
      <button id="keyDownBtn" class="btn amber" aria-label="key down">降</button>
      <button id="keyUpBtn" class="btn red" aria-label="key up">升</button>
      <button id="toneBtn" class="btn violet" aria-label="tone">A</button>
      <button id="melodyToggle" class="btn cyan active-toggle" aria-label="melody">主</button>
      <button id="drumToggle" class="btn slate" aria-label="drum">鼓</button>
      <button id="saveRecBtn" class="btn orange wide" aria-label="save recording">▣ 保存</button>
    </header>

    <section class="karaoke" aria-label="karaoke lyrics">
            <div class="karaoke-panel-title"><span></span><b>即将演唱</b><span></span></div>
<div id="micWave" class="mic-wave" aria-hidden="true">
        <div class="wave-line wave-left"></div>
        <div class="wave-line wave-right"></div>
        <div class="eq eq-left"></div>
        <div class="eq eq-right"></div>
      </div>
      <div id="lyricLine1" class="karaoke-line active"></div>
      <div id="lyricLine2" class="karaoke-line next"></div>
      <div id="lyricLine3" class="karaoke-line next"></div>
      <div id="lyricLine4" class="karaoke-line next"></div>
      <div id="lyricLine5" class="karaoke-line next"></div>
      <div id="lyricLine6" class="karaoke-line next"></div>
      <div id="lyricLine7" class="karaoke-line next"></div>
      <div id="lyricLine8" class="karaoke-line next"></div>
      <div id="lyricLine9" class="karaoke-line next"></div>
      <div id="lyricLine10" class="karaoke-line next"></div>
      <div id="lyricLine11" class="karaoke-line next"></div>
      <div id="lyricLine12" class="karaoke-line next"></div>
      <div id="lyricLine13" class="karaoke-line next"></div>
      <div id="lyricLine14" class="karaoke-line next"></div>
      <div id="lyricLine15" class="karaoke-line next"></div>
      <div id="lyricLine16" class="karaoke-line next"></div>
      <div id="lyricLine17" class="karaoke-line next"></div>
      <div id="lyricLine18" class="karaoke-line next"></div>
      <div id="lyricLine19" class="karaoke-line next"></div>
      <div id="lyricLine20" class="karaoke-line next"></div>
      <div class="karaoke-status">
        <div id="timeStatus" class="meter">00:00 - 00:00</div>
        <div id="micMeter" class="mic-meter" aria-label="microphone level"><span></span></div>
      </div>
    </section>

    <section class="piano-slot top-slot" aria-label="playback piano">
      <div class="shine"></div>
      <div id="playbackScroller" class="piano-scroll">
        <div id="playbackKeyboard" class="keyboard playback-keyboard"></div>
      </div>
    </section>

    <section class="piano-slot bottom-slot" aria-label="manual piano">
      <div class="shine"></div>
      <div id="manualScroller" class="piano-scroll">
        <div id="manualKeyboard" class="manual-keyboard"></div>
      </div>
    </section>

    <div class="hidden-status" aria-hidden="true">
      <span id="midiStatus"></span>
      <span id="sampleStatus"></span>
      <span id="trackStatus"></span>
      <span id="nowPlaying"></span>
    </div>
  </main>

  <script src="vendor/Tone.js"></script>
  <script src="vendor/soundfont-player.min.js"></script>
  <script src="guitar-manifests.js?v=reset-20260710-10"></script>
  <script src="guitar-sampler.js?v=reset-20260710-10"></script>
  <script src="drum-kits.js?v=reset-20260710-10"></script>
<script src="app.js?v=reset-20260710-10"></script>
</body>
</html>
