<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Freeza Live</title>
  <link rel="stylesheet" href="styles.css?v=reset-20260709-26" />
  <link rel="stylesheet" href="start-screen.css?v=reset-20260709-26" />
  <link rel="stylesheet" href="game-screen.css?v=reset-20260709-26" />
  <link rel="stylesheet" href="chord-keys.css?v=reset-20260709-26" />
</head>
<body>

  <section id="startScreen" class="start-screen" aria-label="start options">
    <div class="start-card start-card-v87">
      <div class="start-hero">
        <div>
          <div class="start-title">Freeza Live <span id="startVersion" class="start-version">v20260709.26</span></div>
          <div class="settings-title">演奏设置</div>
        </div>
        <div class="freeza-icon start-freeza-icon" aria-label="freeza live icon"><span class="horn left"></span><span class="horn right"></span><span class="crest"></span><span class="temple left"></span><span class="temple right"></span><span class="brow left"></span><span class="brow right"></span><span class="eye left"></span><span class="eye right"></span><span class="nose"></span><span class="mouth"></span><span class="chin"></span></div>
      </div>

      <div class="start-section stack-section play-source-section">
        <div class="dual-stack-block">
          <div class="section-title"><span class="section-icon">♫</span><span>演奏方式</span></div>
          <div class="option-group vertical-options" data-group="mode">
            <button class="option" data-mode="auto">全自动和弦</button>
            <button class="option selected" data-mode="semi">半自动和弦</button>
            <button class="option" data-mode="manual">手动和弦</button>
          </div>
        </div>
        <div class="dual-stack-block">
          <div class="section-title"><span class="section-icon">≋</span><span>鼓点</span></div>
          <div class="option-group vertical-options drum-mode-card" data-group="drum">
            <button class="option selected" data-drum="auto"><span class="card-icon">🥁</span><span>自动</span></button>
            <button class="option" data-drum="on"><span class="card-icon">🥁</span><span>开</span></button>
            <button class="option" data-drum="off"><span class="card-icon">🥁</span><span>关</span></button>
          </div>
        </div>
      </div>

      <div class="start-section">
        <div class="section-title"><span class="section-icon">◒</span><span>拨片</span></div>
        <div class="option-group segmented two" data-group="pick">
          <button class="option selected" data-pick="A">拨片 A</button>
          <button class="option" data-pick="B">拨片 B</button>
        </div>
      </div>

      <div class="start-section volume-section">
        <div class="section-title"><span class="section-icon">🔊</span><span>音量</span></div>
        <div class="volume-menu sliders">
          <div class="volume-row">
            <div class="volume-label">主旋律</div>
            <input id="menuMelodyVolRange" class="volume-range" type="range" min="25" max="200" step="5" value="100" aria-label="主旋律音量" />
            <button id="menuMelodyVolValue" class="option key-value volume-readout">100%</button>
          </div>
          <div class="volume-row">
            <div class="volume-label">伴奏</div>
            <input id="menuHarmonyVolRange" class="volume-range" type="range" min="25" max="200" step="5" value="155" aria-label="伴奏音量" />
            <button id="menuHarmonyVolValue" class="option key-value volume-readout">155%</button>
          </div>
          <div class="volume-row">
            <div class="volume-label">Key</div>
            <input id="menuKeyRange" class="volume-range key-range" type="range" min="-14" max="14" step="1" value="0" aria-label="Key" />
            <button id="menuKeyValue" class="option key-value volume-readout">0</button>
          </div>
        </div>
      </div>

      <div class="start-section bottom-settings switch-panel">
        <div class="section-title"><span class="section-icon">◉</span><span>开关</span></div>
        <div class="start-row simple-row">
          <div class="row-label with-icon"><span class="section-icon">♫</span>主旋律</div>
          <div class="option-group segmented switch" data-group="melody">
            <button class="option selected" data-melody="on">开</button>
            <button class="option" data-melody="off">关</button>
          </div>
        </div>
        <div class="start-row simple-row">
          <div class="row-label with-icon"><span class="section-icon">⚑</span>引导模式</div>
          <div class="option-group segmented switch" data-group="guide">
            <button class="option" data-guide="on">开</button>
            <button class="option selected" data-guide="off">关</button>
          </div>
        </div>
        <div class="start-row simple-row">
          <div class="row-label with-icon"><span class="section-icon">🎙</span>麦克风</div>
          <div class="option-group segmented switch" data-group="mic">
            <button class="option" data-mic="on">开</button>
            <button class="option selected" data-mic="off">关</button>
          </div>
        </div>
      </div>

      <button id="startGameBtn" class="start-btn">开始</button>
      <div id="loadingFrame" class="loading-frame" aria-live="polite">
        <div class="loading-spinner"></div>
        <div id="loadingText" class="loading-text">准备载入…</div>
      </div>
    </div>
  </section>
  <div id="countdownOverlay" class="countdown-overlay" aria-hidden="true"></div>

  <div id="savePrompt" class="save-prompt" aria-hidden="true">
    <div class="save-card" role="dialog" aria-label="保存录音">
      <div class="save-orb">🎙</div>
      <div class="save-title">保存本次录音？</div>
      <div class="save-subtitle">已录下麦克风和伴奏</div>
      <div id="savePromptSize" class="save-size">准备文件…</div>
      <div class="save-actions">
        <button id="savePromptCancel" class="save-btn ghost">不要</button>
        <button id="savePromptDownload" class="save-btn primary">保存</button>
      </div>
    </div>
  </div>
  <main class="game">
    <div class="freeza-icon" aria-label="freeza live icon"><span class="horn left"></span><span class="horn right"></span><span class="crest"></span><span class="temple left"></span><span class="temple right"></span><span class="brow left"></span><span class="brow right"></span><span class="eye left"></span><span class="eye right"></span><span class="nose"></span><span class="mouth"></span><span class="chin"></span></div>
    <header class="hud">
      <button id="playBtn" class="btn green" aria-label="play">▶</button>
      <button id="restartBtn" class="btn blue wide" aria-label="restart">↻ 重唱</button>
      <button id="keyDownBtn" class="btn amber" aria-label="key down">降</button>
      <button id="keyUpBtn" class="btn red" aria-label="key up">升</button>
      <button id="toneBtn" class="btn violet" aria-label="tone">A</button>
      <button id="melodyToggle" class="btn cyan active-toggle" aria-label="melody">主</button>
      <button id="drumToggle" class="btn slate" aria-label="drum">鼓</button>
      <button id="saveRecBtn" class="btn orange wide" aria-label="save recording">▣ 保存</button>
    </header>

    <section class="karaoke" aria-label="karaoke lyrics">
            <div class="karaoke-panel-title"><span></span><b>即将演唱</b><span></span></div>
<div id="micWave" class="mic-wave" aria-hidden="true">
        <div class="wave-line wave-left"></div>
        <div class="wave-line wave-right"></div>
        <div class="eq eq-left"></div>
        <div class="eq eq-right"></div>
      </div>
      <div id="lyricLine1" class="karaoke-line active"></div>
      <div id="lyricLine2" class="karaoke-line next"></div>
      <div id="lyricLine3" class="karaoke-line next"></div>
      <div id="lyricLine4" class="karaoke-line next"></div>
      <div id="lyricLine5" class="karaoke-line next"></div>
      <div id="lyricLine6" class="karaoke-line next"></div>
      <div id="lyricLine7" class="karaoke-line next"></div>
      <div id="lyricLine8" class="karaoke-line next"></div>
      <div id="lyricLine9" class="karaoke-line next"></div>
      <div id="lyricLine10" class="karaoke-line next"></div>
      <div id="lyricLine11" class="karaoke-line next"></div>
      <div id="lyricLine12" class="karaoke-line next"></div>
      <div id="lyricLine13" class="karaoke-line next"></div>
      <div id="lyricLine14" class="karaoke-line next"></div>
      <div id="lyricLine15" class="karaoke-line next"></div>
      <div id="lyricLine16" class="karaoke-line next"></div>
      <div id="lyricLine17" class="karaoke-line next"></div>
      <div id="lyricLine18" class="karaoke-line next"></div>
      <div id="lyricLine19" class="karaoke-line next"></div>
      <div id="lyricLine20" class="karaoke-line next"></div>
      <div class="karaoke-status">
        <div id="timeStatus" class="meter">00:00 - 00:00</div>
        <div id="micMeter" class="mic-meter" aria-label="microphone level"><span></span></div>
      </div>
    </section>

    <section class="piano-slot top-slot" aria-label="playback piano">
      <div class="shine"></div>
      <div id="playbackScroller" class="piano-scroll">
        <div id="playbackKeyboard" class="keyboard playback-keyboard"></div>
      </div>
    </section>

    <section class="piano-slot bottom-slot" aria-label="manual piano">
      <div class="shine"></div>
      <div id="manualScroller" class="piano-scroll">
        <div id="manualKeyboard" class="manual-keyboard"></div>
      </div>
    </section>

    <div class="hidden-status" aria-hidden="true">
      <span id="midiStatus"></span>
      <span id="sampleStatus"></span>
      <span id="trackStatus"></span>
      <span id="nowPlaying"></span>
    </div>
  </main>

  <script src="vendor/Tone.js"></script>
  <script src="vendor/soundfont-player.min.js"></script>
  <script src="app.js?v=reset-20260709-26"></script>
</body>
</html>
